<!DOCTYPE html>
<html><head><title>Sankey Debug</title></head>
<body>
<h2>Sankey Debug Test</h2>
<div id="log" style="font-family:monospace;font-size:12px;white-space:pre-wrap;background:#f0f0f0;padding:1rem;max-height:400px;overflow:auto"></div>
<div id="chart" style="border:2px solid red;min-height:300px;margin-top:1rem"></div>

<script src="assets/d3.v7.min.js"></script>
<script src="assets/d3-sankey.min.js"></script>
<script>
var log = document.getElementById('log');
function L(msg) { log.textContent += msg + '
'; console.log(msg); }

try {
  L('Step 1: d3 type = ' + typeof d3);
  L('Step 2: d3.sankey type = ' + typeof d3.sankey);
  L('Step 3: d3.sankeyLeft type = ' + typeof d3.sankeyLeft);
  L('Step 4: d3.sankeyLinkHorizontal type = ' + typeof d3.sankeyLinkHorizontal);
  L('Step 5: d3.select type = ' + typeof d3.select);
  L('Step 6: d3.format type = ' + typeof d3.format);
  
  L('
Fetching data...');
  fetch('data/data_sf_coarse.json')
    .then(function(r) { 
      L('Step 7: fetch status = ' + r.status);
      return r.json(); 
    })
    .then(function(data) {
      L('Step 8: data loaded, nodes=' + data.nodes.length + ', links=' + data.links.length);
      
      // Prepare nodes and links for sankey
      var nodes = data.nodes.map(function(n) { return Object.assign({}, n); });
      var links = data.links.map(function(l) { 
        return { source: l.source, target: l.target, value: l.value_usd }; 
      });
      
      L('Step 9: Prepared ' + nodes.length + ' nodes, ' + links.length + ' links');
      L('  First link: ' + JSON.stringify(links[0]));
      L('  First node: ' + JSON.stringify(nodes[0]));
      
      // Create SVG
      var chart = document.getElementById('chart');
      var width = 800;
      var height = 500;
      
      var svg = d3.select('#chart').append('svg')
        .attr('width', width)
        .attr('height', height);
      
      L('Step 10: SVG created');
      
      // Create sankey generator
      var sankey = d3.sankey()
        .nodeId(function(d) { return d.id; })
        .nodeWidth(20)
        .nodePadding(14)
        .nodeAlign(d3.sankeyLeft)
        .extent([[10, 10], [width - 180, height - 10]]);
      
      L('Step 11: Sankey generator created');
      
      // Generate layout
      var graph = sankey({ nodes: nodes, links: links });
      
      L('Step 12: Layout generated, nodes=' + graph.nodes.length + ', links=' + graph.links.length);
      L('  First node position: x0=' + graph.nodes[0].x0 + ' y0=' + graph.nodes[0].y0);
      
      // Draw links
      svg.append('g')
        .selectAll('path')
        .data(graph.links)
        .join('path')
        .attr('d', d3.sankeyLinkHorizontal())
        .attr('fill', 'none')
        .attr('stroke', '#2980b9')
        .attr('stroke-opacity', 0.4)
        .attr('stroke-width', function(d) { return Math.max(1, d.width); });
      
      L('Step 13: Links drawn');
      
      // Draw nodes
      svg.append('g')
        .selectAll('rect')
        .data(graph.nodes)
        .join('rect')
        .attr('x', function(d) { return d.x0; })
        .attr('y', function(d) { return d.y0; })
        .attr('width', function(d) { return d.x1 - d.x0; })
        .attr('height', function(d) { return Math.max(d.y1 - d.y0, 1); })
        .attr('fill', '#2c3e50');
      
      L('Step 14: Nodes drawn');
      
      // Draw labels
      svg.append('g')
        .selectAll('text')
        .data(graph.nodes)
        .join('text')
        .attr('x', function(d) { return d.x0 < width/2 ? d.x1 + 6 : d.x0 - 6; })
        .attr('y', function(d) { return (d.y0 + d.y1) / 2; })
        .attr('dy', '0.35em')
        .attr('text-anchor', function(d) { return d.x0 < width/2 ? 'start' : 'end'; })
        .attr('font-size', '11px')
        .text(function(d) { return d.label + ' $' + d3.format(',')(
          d.type === 'terminal' ? d.targetLinks.reduce(function(s,l){return s+l.value},0) :
          d.sourceLinks.reduce(function(s,l){return s+l.value},0)
        ); });
      
      L('Step 15: Labels drawn');
      L('
=== SUCCESS ===');
    })
    .catch(function(err) {
      L('FETCH ERROR: ' + err.message);
      L('Stack: ' + err.stack);
    });
} catch(err) {
  L('SYNC ERROR: ' + err.message);
  L('Stack: ' + err.stack);
}
</script>
</body>
</html>
