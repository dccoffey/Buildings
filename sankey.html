  // ===== Load Data =====
  async function loadData(arch, res) {
    const key = `${arch}_${res}`;
    if (dataCache[key]) return dataCache[key];
    const d = EMBEDDED_DATA[key];
    if (!d) throw new Error(`No data for ${key}`);
    dataCache[key] = d;
    return d;
  }

  // ===== Recalculate Discounted Values =====
  function recalcLinks(data, rate, mode) {
    const pv30 = pvFactor(rate, 30);
    return data.links.map(link => {
      let val;
      if (mode === 'nominal') {
        val = link.value_usd;
      } else {
        if (link.cadence === 'one_time') {
          val = link.value_usd;
        } else if (link.cadence === 'annual') {
          const annual = link.value_usd / 30;
          val = Math.round(annual * pv30);
        } else if (link.cadence === 'end_of_horizon') {
          val = Math.round(link.value_usd / Math.pow(1 + rate, 30));
        } else if (link.cadence === 'periodic_replacement') {
          // Use stored discounted value as approximation, scaled by rate difference from 3%
          if (rate === 0.03) {
            val = link.discounted_value_usd;
          } else {
            const ratio = pvFactor(rate, 30) / pvFactor(0.03, 30);
            val = Math.round(link.discounted_value_usd * ratio);
          }
        } else if (link.cadence === 'mixed') {
          // Mixed cadence (e.g., financing = one-time fees + recurring interest)
          if (rate === 0.03) {
            val = link.discounted_value_usd;
          } else {
            // Estimate one-time portion vs recurring portion, then discount each correctly
            const recurringShare = (link.value_usd - link.discounted_value_usd) / (link.value_usd * (1 - pvFactor(0.03, 30) / 30));
            const oneTimePortion = link.discounted_value_usd * (1 - Math.min(recurringShare, 0.95));
            const recurringPortion = link.discounted_value_usd - oneTimePortion;
            const ratio = pvFactor(rate, 30) / pvFactor(0.03, 30);
            val = Math.round(oneTimePortion + recurringPortion * ratio);
          }
        } else {
          val = link.value_usd;
        }
      }
      return { ...link, displayValue: Math.max(val, 1) };
    });
  }

  // ===== Render Sankey =====
  async function render() {
    let data;
    try {
      data = await loadData(state.archetype, state.resolution);
    } catch (err) {
      const container = document.getElementById('sankeyChart');
      container.innerHTML = '<div style="padding:2rem;color:#e74c3c;text-align:center">' +
        '<h3>Failed to load data</h3>' +
        '<p style="color:#666;margin-top:0.5rem">Error: ' + err.message + '</p>' +
        '<p style="color:#666;margin-top:0.5rem">If you opened this file directly, you need a local web server. ' +
        'Run <code>python -m http.server 8000</code> in this folder and open <code>http://localhost:8000</code></p></div>';
      return;
    }
    try {
    const links = recalcLinks(data, state.rate, state.discount);

    // Filter to only category->total links for Sankey (avoid sub->cat->total double-counting)
    const totalLinks = links.filter(l => l.target === 'total');
    const subLinks = links.filter(l => l.target !== 'total');

    let sankeyLinks, sankeyNodes;
    if (state.resolution === 'fine') {
      // For fine: show sub->category->total
      sankeyLinks = links.map(l => ({
        source: l.source, target: l.target, value: l.displayValue, original: l
      }));
      sankeyNodes = data.nodes.map(n => ({ ...n }));
    } else {
      // For coarse: only category->total
      sankeyLinks = totalLinks.map(l => ({
        source: l.source, target: l.target, value: l.displayValue, original: l
      }));
      sankeyNodes = data.nodes.filter(n =>
        n.type === 'terminal' || totalLinks.some(l => l.source === n.id)
      ).map(n => ({ ...n }));
    }

    const grandTotal = totalLinks.reduce((s, l) => s + l.displayValue, 0);

    // Update stat cards
    const sqft = data.total_area_sqft;
    const units = data.units || 1;
    document.getElementById('statCards').innerHTML = `
      <div class="stat-card">
        <div class="stat-label">Total 30-Year Cost</div>
        <div class="stat-value">${fmt(grandTotal)}</div>
        <div class="stat-sub">${state.discount === 'discounted' ? 'Present Value @ ' + fmtPct(state.rate * 100) + '%' : 'Undiscounted'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Per ft\u00b2</div>
        <div class="stat-value">${fmt(grandTotal / sqft)}</div>
        <div class="stat-sub">${sqft.toLocaleString()} ft\u00b2 ${state.archetype === 'MF' ? '(per unit)' : ''}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">CapEx Share</div>
        <div class="stat-value">${fmtPct(totalLinks.filter(l => ['land','design_permit','construction','overhead_profit'].includes(l.source)).reduce((s,l) => s + l.displayValue, 0) / grandTotal * 100)}%</div>
        <div class="stat-sub">Pre-construction + Construction</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">OpEx Share</div>
        <div class="stat-value">${fmtPct(totalLinks.filter(l => ['tax','insurance','utilities','maintenance','maint_ops','replacements','hoa','prop_mgmt'].includes(l.source)).reduce((s,l) => s + l.displayValue, 0) / grandTotal * 100)}%</div>
        <div class="stat-sub">Operations + Replacements</div>
      </div>
    `;

    // Update subtitle
    const archLabel = state.archetype === 'SF' ? 'Single-Family (2,200 ft\u00b2)' : 'Multifamily (100-unit, per unit)';
    const discLabel = state.discount === 'discounted' ? `Discounted @ ${fmtPct(state.rate*100)}%` : 'Undiscounted';
    document.getElementById('chartSubtitle').textContent =
      `${archLabel} | ${state.resolution === 'coarse' ? 'Coarse' : 'Fine'} | ${discLabel} | 2024 USD`;

    // ===== D3 Sankey =====
    const container = document.getElementById('sankeyChart');
    container.innerHTML = '';
    const margin = { top: 10, right: 180, bottom: 10, left: 10 };
    const width = Math.max(container.clientWidth, 800) - margin.left - margin.right;
    const height = state.resolution === 'fine' ? 700 : 500;

    const svg = d3.select('#sankeyChart').append('svg')
      .attr('width', width + margin.left + margin.right)
      .attr('height', height + margin.top + margin.bottom)
      .append('g')
      .attr('transform', `translate(${margin.left},${margin.top})`);

    // Build index map
    const nodeMap = new Map(sankeyNodes.map((n, i) => [n.id, i]));

    const sankeyGen = d3.sankey()
      .nodeId(d => d.id)
      .nodeWidth(20)
      .nodePadding(state.resolution === 'fine' ? 8 : 14)
      .nodeAlign(d3.sankeyLeft)
      .extent([[0, 0], [width, height]]);

    const graph = sankeyGen({
      nodes: sankeyNodes.map(d => ({ ...d })),
      links: sankeyLinks.filter(l => nodeMap.has(l.source) && nodeMap.has(l.target))
        .map(d => ({ ...d }))
    });

    // Links
    const linkG = svg.append('g').attr('class', 'links');
    linkG.selectAll('path')
      .data(graph.links)
      .join('path')
      .attr('class', 'sankey-link')
      .attr('d', d3.sankeyLinkHorizontal())
      .attr('stroke', d => stageColors[d.source.stage] || '#999')
      .attr('stroke-width', d => Math.max(1, d.width))
      .on('mouseover', showLinkTooltip)
      .on('mousemove', moveTooltip)
      .on('mouseout', hideTooltip)
      .on('click', (e, d) => goProvenance(d.original.provenance_id));

    // Nodes
    const nodeG = svg.append('g').attr('class', 'nodes');
    const node = nodeG.selectAll('g')
      .data(graph.nodes)
      .join('g')
      .attr('class', 'sankey-node')
      .attr('transform', d => `translate(${d.x0},${d.y0})`);

    node.append('rect')
      .attr('height', d => Math.max(d.y1 - d.y0, 1))
      .attr('width', sankeyGen.nodeWidth())
      .attr('fill', d => stageColors[d.stage] || '#666')
      .on('mouseover', showNodeTooltip)
      .on('mousemove', moveTooltip)
      .on('mouseout', hideTooltip)
      .on('click', (e, d) => {
        const pids = [];
        graph.links.filter(l => l.source === d || l.target === d).forEach(l => {
          if (l.original && l.original.provenance_id) pids.push(...l.original.provenance_id);
        });
        goProvenance(pids);
      });

    node.append('text')
      .attr('x', d => d.x0 < width / 2 ? sankeyGen.nodeWidth() + 6 : -6)
      .attr('y', d => (d.y1 - d.y0) / 2)
      .attr('dy', '0.35em')
      .attr('text-anchor', d => d.x0 < width / 2 ? 'start' : 'end')
      .text(d => d.label)
      .style('font-size', '11px')
      .style('font-weight', d => d.type === 'terminal' ? '700' : '400');

    // Value labels (clickable)
    node.filter(d => d.type !== 'sub_component')
      .append('text')
      .attr('class', 'sankey-value')
      .attr('x', d => d.x0 < width / 2 ? sankeyGen.nodeWidth() + 6 : -6)
      .attr('y', d => (d.y1 - d.y0) / 2 + 14)
      .attr('text-anchor', d => d.x0 < width / 2 ? 'start' : 'end')
      .text(d => {
        const nodeVal = d.type === 'terminal' ? grandTotal :
          graph.links.filter(l => l.target.id === 'total' && l.source.id === d.id)
            .reduce((s, l) => s + l.value, 0) ||
          graph.links.filter(l => l.source.id === d.id)
            .reduce((s, l) => s + l.value, 0);
        return fmt(nodeVal);
      })
      .style('cursor', 'pointer')
      .on('click', (e, d) => {
        const pids = [];
        graph.links.filter(l => l.source === d || l.target === d).forEach(l => {
          if (l.original && l.original.provenance_id) pids.push(...l.original.provenance_id);
        });
        goProvenance(pids);
      });

    // Legend
    const legendEl = document.getElementById('legend');
    legendEl.innerHTML = Object.entries(stageColors)
      .filter(([k]) => k !== 'total')
      .map(([k, c]) => `<div class="legend-item"><div class="legend-swatch" style="background:${c}"></div>${k.replace('_', '-')}</div>`)
      .join('');
    } catch (renderErr) {
      console.error('Sankey render error:', renderErr);
      const container = document.getElementById('sankeyChart');
      container.innerHTML = '<div style="padding:2rem;color:#e74c3c;text-align:center">' +
        '<h3>Rendering Error</h3>' +
        '<p style="color:#666;margin-top:0.5rem">' + renderErr.message + '</p>' +
        '<p style="color:#888;font-size:0.8rem;margin-top:0.5rem">' + renderErr.stack + '</p></div>';
    }
  }

  // ===== Tooltips =====
  const tooltip = document.getElementById('tooltip');

  function showLinkTooltip(e, d) {
    const orig = d.original || {};
    tooltip.innerHTML = `
      <div class="tt-title">${d.source.label} \u2192 ${d.target.label}</div>
      <div class="tt-row"><span class="tt-label">Value</span><span class="tt-val">${fmt(d.value)}</span></div>
      <div class="tt-row"><span class="tt-label">Cadence</span><span class="tt-val">${(orig.cadence||'').replace('_',' ')}</span></div>
      <div class="tt-row"><span class="tt-label">Year Basis</span><span class="tt-val">${orig.year_basis||'2024 USD'}</span></div>
      <div class="tt-row"><span class="tt-label">Mode</span><span class="tt-val">${state.discount === 'discounted' ? 'Discounted @'+fmtPct(state.rate*100)+'%' : 'Undiscounted'}</span></div>
      <div class="tt-method" style="pointer-events:auto;cursor:pointer" onclick="goProvenance(${JSON.stringify(orig.provenance_id||[])})">&#9432; View sources &amp; method</div>
    `;
    tooltip.classList.add('show');
  }

  function showNodeTooltip(e, d) {
    const nodeLinks = d.sourceLinks || d.targetLinks || [];
    const totalVal = d.type === 'terminal'
      ? d.targetLinks.reduce((s, l) => s + l.value, 0)
      : (d.sourceLinks || []).reduce((s, l) => s + l.value, 0);
    tooltip.innerHTML = `
      <div class="tt-title">${d.label}</div>
      <div class="tt-row"><span class="tt-label">Description</span><span class="tt-val">${d.description||''}</span></div>
      <div class="tt-row"><span class="tt-label">Total Value</span><span class="tt-val">${fmt(totalVal)}</span></div>
      <div class="tt-row"><span class="tt-label">Stage</span><span class="tt-val">${(d.stage||'').replace('_',' ')}</span></div>
    `;
    tooltip.classList.add('show');
  }

  function moveTooltip(e) {
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  }
  let hideTimer;
  function hideTooltip() {
    hideTimer = setTimeout(() => tooltip.classList.remove('show'), 200);
  }
  tooltip.addEventListener('mouseenter', () => clearTimeout(hideTimer));
  tooltip.addEventListener('mouseleave', () => tooltip.classList.remove('show'));

  // ===== Navigation to Provenance =====
  window.goProvenance = function(ids) {
    if (!ids || ids.length === 0) return;
    const id = Array.isArray(ids) ? ids[0] : ids;
    window.open(`sources.html#${id}`, '_blank');
  };

  // ===== Toggle Handlers =====
  document.querySelectorAll('.toggle-btn').forEach(group => {
    group.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        group.querySelectorAll('button').forEach(b => {
          b.classList.remove('active');
          b.setAttribute('aria-checked', 'false');
          b.setAttribute('tabindex', '-1');
        });
        btn.classList.add('active');
        btn.setAttribute('aria-checked', 'true');
        btn.setAttribute('tabindex', '0');

        const val = btn.dataset.val;
        const label = group.getAttribute('aria-label') || '';
        if (val === 'SF' || val === 'MF') state.archetype = val;
        else if (val === 'coarse' || val === 'fine') state.resolution = val;
        else if (val === 'nominal' || val === 'discounted') state.discount = val;
        render();
      });
    });
  });

  const slider = document.getElementById('discountSlider');
  const sliderVal = document.getElementById('discountVal');
  slider.addEventListener('input', () => {
    state.rate = parseFloat(slider.value) / 100;
    sliderVal.textContent = parseFloat(slider.value).toFixed(1) + '%';
    if (state.discount === 'discounted') render();
  });

  // ===== Init =====
  render();

})();
</script>
</body>
</html>
